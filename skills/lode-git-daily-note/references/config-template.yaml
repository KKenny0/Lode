# Lode Configuration Template
# 全局: ~/.lode/config.yaml  |  项目级: {project-root}/.lode/config.yaml

# 知识库路径（必填）
knowledge_vault: /path/to/your/knowledge-vault

# 日报设置（可选，原 .daily-note-config.yaml）
daily_note:
  # 日报文件路径（默认 {vault}/Daily Note.md）
  path: /path/to/your/Daily Note.md

  # 工作仓库列表（可选，不配置则使用当前目录）
  repos:
    - /path/to/repo1
    - /path/to/repo2

  # 自定义类别（可选，不配置则使用默认类别）
  categories:
    - name: 【安全加固】
      patterns: ["security", "auth", "permission"]
    - name: 【性能优化】
      patterns: ["perf", "optimize", "speed"]

  # 启用 LLM 语义分类（可选，默认 false）
  enable_smart_classify: false
